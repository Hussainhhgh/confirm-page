<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #0f172a;
      font-family: sans-serif;
      color: white;
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 3rem;
      border-radius: 16px;
      max-width: 400px;
    }
    .check { font-size: 4rem; color: #22c55e; }
    h1 { margin: 1rem 0; font-size: 1.8rem; }
    p { color: #94a3b8; margin-bottom: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>Email Confirmed!</h1>
    <p>Your account has been verified successfully. You can now close this tab and open the app.</p>
  </div>
</body>
</html>
